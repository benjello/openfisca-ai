# Minimal example for config/user.yaml
# Copy to config/user.yaml and set your paths:
#   cp config/user.example.yaml config/user.yaml
#
# This file uses the canonical schema expected by config_loader.py.

base_path: /home/YOUR_USERNAME/projets
legislation_base_path: /home/YOUR_USERNAME/legislation
active_country: tunisia

countries:
  tunisia:
    legislative_sources:
      root: ${legislation_base_path}/tunisia
    existing_code:
      path: ${base_path}/openfisca-tunisia

  # Add more countries when you add them to config/countries/:
  # france:
  #   legislative_sources:
  #     root: ${legislation_base_path}/france
  #   existing_code:
  #     path: ${base_path}/openfisca-france
